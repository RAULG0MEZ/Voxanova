name: Build plugin release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag. Empty uses package.json version."
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macOS
            os: macos-14
            installer: Voxanova-macOS.pkg
          - platform: Windows
            os: windows-2022
            installer: Voxanova-Windows-Setup.exe
          - platform: Linux
            os: ubuntu-24.04
            installer: Voxanova-Linux-amd64.deb

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: Voxanova/package-lock.json

      - name: Install web dependencies
        working-directory: Voxanova
        run: npm ci

      - name: Build embedded web UI
        working-directory: Voxanova
        run: npm run build

      - name: Install Linux build packages
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libcurl4-openssl-dev \
            libfreetype6-dev \
            libfontconfig1-dev \
            libgtk-3-dev \
            libjack-jackd2-dev \
            libwebkit2gtk-4.1-dev \
            libx11-dev \
            libxcomposite-dev \
            libxcursor-dev \
            libxext-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxrender-dev \
            ladspa-sdk \
            mesa-common-dev

      - name: Download JUCE
        shell: bash
        run: git clone --depth 1 --branch 8.0.13 https://github.com/juce-framework/JUCE.git JUCE

      - name: Install WebView2 package
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Get-PackageProvider -Name NuGet -ForceBootstrap | Out-Null
          if (-not (Get-PackageSource -Name nugetRepository -ErrorAction SilentlyContinue)) {
            Register-PackageSource -ProviderName NuGet -Name nugetRepository -Location https://www.nuget.org/api/v2 -Trusted -Force | Out-Null
          }
          Install-Package Microsoft.Web.WebView2 -Scope CurrentUser -RequiredVersion 1.0.3485.44 -Source nugetRepository -Force | Out-Null

      - name: Install Windows installer tools
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Configure plugin
        shell: bash
        run: cmake -S Voxanova/plugin-shell -B Voxanova/plugin-shell/build -DCMAKE_BUILD_TYPE=Release -DJUCE_DIR="${GITHUB_WORKSPACE}/JUCE"

      - name: Build plugin
        shell: bash
        run: cmake --build Voxanova/plugin-shell/build --config Release --parallel

      - name: Package macOS
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          export COPYFILE_DISABLE=1
          ROOT="Voxanova/plugin-shell/build/Voxanova_artefacts/Release"
          VERSION="$(node -p "require('./Voxanova/package.json').version")"
          PAYLOAD="Voxanova-macOS-payload"
          mkdir -p \
            "$PAYLOAD/Library/Audio/Plug-Ins/VST3" \
            "$PAYLOAD/Library/Audio/Plug-Ins/Components" \
            "$PAYLOAD/Applications"
          ditto "$ROOT/VST3/Voxanova.vst3" "$PAYLOAD/Library/Audio/Plug-Ins/VST3/Voxanova.vst3"
          ditto "$ROOT/AU/Voxanova.component" "$PAYLOAD/Library/Audio/Plug-Ins/Components/Voxanova.component"
          if [ -d "$ROOT/Standalone/Voxanova.app" ]; then
            ditto "$ROOT/Standalone/Voxanova.app" "$PAYLOAD/Applications/Voxanova.app"
          fi
          pkgbuild \
            --root "$PAYLOAD" \
            --identifier com.voxanova.plugin \
            --version "$VERSION" \
            --install-location / \
            --ownership recommended \
            "${{ matrix.installer }}"

      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $root = "Voxanova/plugin-shell/build/Voxanova_artefacts/Release"
          $version = node -p "require('./Voxanova/package.json').version"
          $payload = "Voxanova-Windows-payload"
          New-Item -ItemType Directory -Force "$payload\VST3", "$payload\Standalone" | Out-Null
          Copy-Item -Recurse "$root\VST3\Voxanova.vst3" "$payload\VST3\"
          if (Test-Path "$root/Standalone/Voxanova.exe") {
            Copy-Item "$root\Standalone\Voxanova.exe" "$payload\Standalone\"
          }
          $payloadPath = (Resolve-Path $payload).Path
          $isccCommand = Get-Command iscc.exe -ErrorAction SilentlyContinue
          $iscc = if ($isccCommand) { $isccCommand.Source } else { $null }
          if (-not $iscc) {
            $programFilesX86 = [Environment]::GetEnvironmentVariable("ProgramFiles(x86)")
            $iscc = Join-Path $programFilesX86 "Inno Setup 6\ISCC.exe"
          }
          if (-not (Test-Path $iscc)) {
            $iscc = Join-Path ${env:ProgramFiles} "Inno Setup 6\ISCC.exe"
          }
          @"
          [Setup]
          AppId=Voxanova.Plugin
          AppName=Voxanova
          AppVersion=$version
          AppPublisher=Voxanova
          DefaultDirName={autopf}\Voxanova
          DefaultGroupName=Voxanova
          DisableProgramGroupPage=yes
          OutputDir=.
          OutputBaseFilename=Voxanova-Windows-Setup
          Compression=lzma2
          SolidCompression=yes
          ArchitecturesAllowed=x64
          ArchitecturesInstallIn64BitMode=x64
          PrivilegesRequired=admin
          WizardStyle=modern
          UninstallDisplayName=Voxanova

          [Files]
          Source: "$payloadPath\VST3\Voxanova.vst3\*"; DestDir: "{commoncf}\VST3\Voxanova.vst3"; Flags: ignoreversion recursesubdirs createallsubdirs
          Source: "$payloadPath\Standalone\Voxanova.exe"; DestDir: "{app}"; Flags: ignoreversion skipifsourcedoesntexist

          [Icons]
          Name: "{group}\Voxanova"; Filename: "{app}\Voxanova.exe"
          Name: "{commondesktop}\Voxanova"; Filename: "{app}\Voxanova.exe"; Tasks: desktopicon

          [Tasks]
          Name: "desktopicon"; Description: "Crear acceso directo en el escritorio"; GroupDescription: "Accesos directos:"; Flags: unchecked
          "@ | Set-Content -Encoding UTF8 "voxanova-installer.iss"
          & $iscc "voxanova-installer.iss"

      - name: Package Linux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          ROOT="Voxanova/plugin-shell/build/Voxanova_artefacts/Release"
          VERSION="$(node -p "require('./Voxanova/package.json').version")"
          DEBROOT="Voxanova-Linux-deb"
          mkdir -p \
            "$DEBROOT/DEBIAN" \
            "$DEBROOT/usr/lib/vst3" \
            "$DEBROOT/usr/bin" \
            "$DEBROOT/usr/share/applications" \
            "$DEBROOT/usr/share/doc/voxanova"
          cp -R "$ROOT/VST3/Voxanova.vst3" "$DEBROOT/usr/lib/vst3/"
          if [ -f "$ROOT/Standalone/Voxanova" ]; then
            install -m 755 "$ROOT/Standalone/Voxanova" "$DEBROOT/usr/bin/voxanova"
          fi
          cat > "$DEBROOT/usr/share/applications/com.voxanova.Voxanova.desktop" <<'DESKTOP'
          [Desktop Entry]
          Name=Voxanova
          Comment=Vocal chain audio plugin
          Exec=voxanova
          Type=Application
          Categories=Audio;AudioVideo;
          Terminal=false
          DESKTOP
          cat > "$DEBROOT/usr/share/doc/voxanova/README" <<'README'
          Voxanova installs the VST3 plugin to /usr/lib/vst3.
          Restart your DAW after installing or upgrading.
          README
          cat > "$DEBROOT/DEBIAN/control" <<CONTROL
          Package: voxanova
          Version: ${VERSION}
          Section: sound
          Priority: optional
          Architecture: amd64
          Maintainer: Voxanova <releases@voxanova.local>
          Depends: libc6, libstdc++6, libgcc-s1, libasound2t64 | libasound2, libcurl4t64 | libcurl4, libfreetype6, libfontconfig1, libgtk-3-0, libwebkit2gtk-4.1-0 | libwebkit2gtk-4.0-37, libx11-6, libxcomposite1, libxcursor1, libxext6, libxinerama1, libxrandr2, libxrender1
          Description: Voxanova vocal chain audio plugin
           Voxanova is a vocal chain plugin packaged as VST3 with a standalone app.
          CONTROL
          chmod 755 "$DEBROOT/DEBIAN"
          chmod 644 "$DEBROOT/DEBIAN/control"
          dpkg-deb --root-owner-group --build "$DEBROOT" "${{ matrix.installer }}"

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.platform }} package
          path: ${{ matrix.installer }}

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download packages
        uses: actions/download-artifact@v8
        with:
          path: release-packages
          pattern: "* package"
          merge-multiple: true

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG="${GITHUB_REF_NAME}"
          elif [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            VERSION="$(node -p "require('./Voxanova/package.json').version")"
            TAG="v${VERSION}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_NOTES="Instaladores nativos de Voxanova generados por GitHub Actions. Descarga el instalador de tu sistema operativo, abre la ventana del instalador y reinicia tu DAW si estaba abierto."
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            for old_asset in Voxanova-macOS-Installer.zip Voxanova-Windows-Installer.zip Voxanova-Linux-Installer.zip; do
              gh release delete-asset "$RELEASE_TAG" "$old_asset" --yes >/dev/null 2>&1 || true
            done
            gh release upload "$RELEASE_TAG" release-packages/* --clobber
            gh release edit "$RELEASE_TAG" --notes "$RELEASE_NOTES"
          else
            gh release create "$RELEASE_TAG" release-packages/* \
              --title "Voxanova ${RELEASE_TAG}" \
              --target "${GITHUB_SHA}" \
              --notes "$RELEASE_NOTES"
          fi
